<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body class="day">
    <header>
        <div class="main-section">
            <h1 id="main-heading">EXPENSE TRACKER</h1>
            <i class="fa-solid fa-bars" id="settings" aria-label="Open settings"></i>
            <section class="nav-section hide">
                <div class="nav-bar">
                    <button class="mode menu">Change mode</button>
                    <button class="set-budget menu">Set budget</button>
                    <button class="view-budget menu">View budget</button>
                    <button class="resetBudget menu">Reset Budget</button>
                    <button class="reset menu">Reset Expenses</button>
                    <button class="clear menu">Clear all data</button>
                    
                </div>
            </section>
        </div>
        <h3 class="caption">Track every rupee. Stay in control.</h3>
    </header>

    <main>
        <div class="Add-Expense-section">
            <button id="add-expense">Add Expense</button>
            <div class="New-expense hide">
                <input type="text" placeholder="Expense Name" class="Expense-name">
                <input type="number" placeholder="Amount (₹)" class="Expense-amount">
                <select id="expense-categories" class="Expense-classes">
                    <option value="Category" selected disabled>Category</option>
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Bills">Bills</option>
                </select>
                <button id="Save-expense">Save Expense</button>
            </div>
        </div>

        <h3 id="expenses-heading">Your Expenses</h3>
        <div class="expense-list-container">
            <p class="empty-msg hide">No expenses yet. Add one 👆</p>
            <div class="expense-list">
            </div>
        </div>

        <div class="CategoryWise-expenses hide">
            <p class="food-expense"></p>
            <p class="travel-expense"></p>
            <p class="bills-expense"></p>
        </div>

        <div class="totalExpense-section hide">
            <p class="Total-expenses"></p>
            <p class="balance hide"></p>
        </div>
    
    
    </main>
    
    <script src="expense_tracker.js"></script>
</body>
</html>
